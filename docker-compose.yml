version: '3.8'

services:
  arch-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: arch-dev:latest
    container_name: arch-dev-container
    # Mount the home directory from the repository
    volumes:
      - ./home:/home/user
    # Keep container running
    stdin_open: true
    tty: true
    # Enable systemd capabilities
    privileged: true
    # Optional: specify systemd as the init process
    # command: /usr/lib/systemd/systemd
