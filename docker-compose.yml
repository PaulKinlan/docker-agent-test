services:
  agent-host:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-host:latest
    platform: linux/amd64
    container_name: agent-host
    volumes:
      # Mount entire /home so every agent's home dir is visible on the host
      - ./home:/home
      # Mount /var/log so system and agent logs (journald, smtpd) are visible on the host
      - ./log:/var/log
      # Mount mail spool so inter-agent messages are visible on the host
      - ./mail:/var/spool/mail
    # Systemd needs these tmpfs mounts
    tmpfs:
      - /run
      - /run/lock
    # Required for systemd
    privileged: true
    # Keep container alive
    stdin_open: true
    tty: true
    # API key passthrough from host environment
    # These are written to /etc/agent-api-keys/global.env at container start
    # Set any of these on your host to make them available to all agents
    environment:
      # Anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Google
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Mistral
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      # Other providers
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      # AWS Bedrock
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-}
      # Azure OpenAI
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      # Agent loop configuration
      - AGENT_CYCLE_INTERVAL=${AGENT_CYCLE_INTERVAL:-}
      - AGENT_MODEL=${AGENT_MODEL:-}
      - AGENT_MAX_TURNS=${AGENT_MAX_TURNS:-}
